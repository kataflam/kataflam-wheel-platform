<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kataflam - Client Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 0.9em;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #f5f5f5;
            padding: 5px;
            border-radius: 10px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            color: #666;
        }

        .tab.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 0.9em;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            color: #999;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .google-btn {
            background: white;
            color: #333;
            border: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .google-btn:hover {
            background: #f5f5f5;
            border-color: #667eea;
        }

        .link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9em;
        }

        .link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .alert.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }

        .alert.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 15px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
        }

        .checkbox-group label {
            margin: 0;
            font-weight: normal;
            font-size: 0.9em;
        }

        .password-strength {
            margin-top: 8px;
            font-size: 0.85em;
        }

        .strength-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }

        .strength-weak { width: 33%; background: #dc3545; }
        .strength-medium { width: 66%; background: #ffc107; }
        .strength-strong { width: 100%; background: #28a745; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <h1>🎡 Kataflam</h1>
            <p>Spin-the-Wheel Platform</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchAuthTab('login')">Login</button>
            <button class="tab" onclick="switchAuthTab('signup')">Sign Up</button>
        </div>

        <div id="alertBox"></div>

        <!-- Login Form -->
        <div id="loginTab" class="tab-content active">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required placeholder="you@company.com">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="Enter your password">
                </div>

                <div class="link" style="text-align: right; margin-bottom: 15px; margin-top: -10px;">
                    <a href="#" onclick="showForgotPassword(); return false;">Forgot password?</a>
                </div>

                <button type="submit" id="loginBtn">🔓 Login</button>
            </form>

            <div class="divider">OR</div>

            <button class="google-btn" onclick="loginWithGoogle()">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>

            <div class="link">
                Don't have an account? <a href="#" onclick="switchAuthTab('signup'); return false;">Sign up</a>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signupTab" class="tab-content">
            <form onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="signupCompany" required placeholder="Your Company">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" required placeholder="you@company.com">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" required placeholder="Min. 8 characters" 
                           oninput="checkPasswordStrength(this.value)">
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthBar"></div>
                        </div>
                        <span id="strengthText"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" required placeholder="Confirm password">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="agreeTerms" required>
                    <label for="agreeTerms">I agree to the <a href="#" style="color: #667eea;">Terms & Conditions</a></label>
                </div>

                <button type="submit" id="signupBtn">🎉 Create Account</button>
            </form>

            <div class="divider">OR</div>

            <button class="google-btn" onclick="loginWithGoogle()">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign up with Google
            </button>

            <div class="link">
                Already have an account? <a href="#" onclick="switchAuthTab('login'); return false;">Login</a>
            </div>
        </div>

        <!-- Forgot Password Form (Hidden) -->
        <div id="forgotTab" class="tab-content">
            <h2 style="margin-bottom: 10px; color: #333;">Reset Password</h2>
            <p style="color: #666; margin-bottom: 25px; font-size: 0.9em;">
                Enter your email and we'll send you a reset link.
            </p>

            <form onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="forgotEmail" required placeholder="you@company.com">
                </div>

                <button type="submit" id="forgotBtn">📧 Send Reset Link</button>
            </form>

            <div class="link">
                Remember your password? <a href="#" onclick="switchAuthTab('login'); return false;">Back to login</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, 
                 GoogleAuthProvider, signInWithPopup, sendEmailVerification, 
                 sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0LKrnMv-hhM5_uzKeGvjOf-yOXt7rVmM",
            authDomain: "kataflam-white-label.firebaseapp.com",
            projectId: "kataflam-white-label",
            storageBucket: "kataflam-white-label.firebasestorage.app",
            messagingSenderId: "571581972788",
            appId: "1:571581972788:web:7bb7cc53145a425e40a561"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        window.switchAuthTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginTab').classList.add('active');
            } else if (tab === 'signup') {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('signupTab').classList.add('active');
            }
            
            clearAlert();
        };

        window.showForgotPassword = function() {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('forgotTab').classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            clearAlert();
        };

        function showAlert(message, type = 'success') {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerHTML = `<div class="alert ${type}">${message}</div>`;
        }

        function clearAlert() {
            document.getElementById('alertBox').innerHTML = '';
        }

        window.handleLogin = async function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            
            btn.disabled = true;
            btn.textContent = '⏳ Logging in...';
            clearAlert();

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                if (!user.emailVerified) {
                    showAlert('⚠️ Please verify your email first. Check your inbox!', 'error');
                    btn.disabled = false;
                    btn.textContent = '🔓 Login';
                    return;
                }
                
                showAlert('✅ Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } catch (error) {
                console.error('Login error:', error);
                showAlert('❌ ' + getErrorMessage(error.code), 'error');
                btn.disabled = false;
                btn.textContent = '🔓 Login';
            }
        };

        window.handleSignup = async function(e) {
            e.preventDefault();
            const company = document.getElementById('signupCompany').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            const btn = document.getElementById('signupBtn');
            
            if (password !== confirmPassword) {
                showAlert('❌ Passwords do not match!', 'error');
                return;
            }

            if (password.length < 8) {
                showAlert('❌ Password must be at least 8 characters!', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '⏳ Creating account...';
            clearAlert();

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Create user profile in Firestore
                await setDoc(doc(db, 'users', user.uid), {
                    email: user.email,
                    companyName: company,
                    plan: 'trial',
                    status: 'trial',
                    createdAt: new Date().toISOString(),
                    emailVerified: false
                });

                // Send verification email
                await sendEmailVerification(user);
                
                showAlert('✅ Account created! Please check your email to verify your account.', 'success');
                
                setTimeout(() => {
                    switchAuthTab('login');
                    document.getElementById('loginEmail').value = email;
                }, 3000);
                
            } catch (error) {
                console.error('Signup error:', error);
                showAlert('❌ ' + getErrorMessage(error.code), 'error');
                btn.disabled = false;
                btn.textContent = '🎉 Create Account';
            }
        };

        window.handleForgotPassword = async function(e) {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            const btn = document.getElementById('forgotBtn');
            
            btn.disabled = true;
            btn.textContent = '⏳ Sending...';
            clearAlert();

            try {
                await sendPasswordResetEmail(auth, email);
                showAlert('✅ Password reset email sent! Check your inbox.', 'success');
                
                setTimeout(() => {
                    switchAuthTab('login');
                }, 3000);
            } catch (error) {
                console.error('Reset error:', error);
                showAlert('❌ ' + getErrorMessage(error.code), 'error');
                btn.disabled = false;
                btn.textContent = '📧 Send Reset Link';
            }
        };

        window.loginWithGoogle = async function() {
            clearAlert();
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                
                // Check if user exists
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                
                if (!userDoc.exists()) {
                    // New Google user - create profile
                    await setDoc(doc(db, 'users', user.uid), {
                        email: user.email,
                        companyName: user.displayName || 'My Company',
                        plan: 'trial',
                        status: 'trial',
                        createdAt: new Date().toISOString(),
                        emailVerified: true,
                        photoURL: user.photoURL
                    });
                }
                
                showAlert('✅ Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } catch (error) {
                console.error('Google login error:', error);
                showAlert('❌ Google login failed. Please try again.', 'error');
            }
        };

        window.checkPasswordStrength = function(password) {
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            
            if (password.length === 0) {
                bar.className = 'strength-fill';
                text.textContent = '';
                return;
            }
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            if (strength <= 1) {
                bar.className = 'strength-fill strength-weak';
                text.textContent = '❌ Weak';
                text.style.color = '#dc3545';
            } else if (strength <= 3) {
                bar.className = 'strength-fill strength-medium';
                text.textContent = '⚠️ Medium';
                text.style.color = '#ffc107';
            } else {
                bar.className = 'strength-fill strength-strong';
                text.textContent = '✅ Strong';
                text.style.color = '#28a745';
            }
        };

        function getErrorMessage(errorCode) {
            const errors = {
                'auth/email-already-in-use': 'Email already registered!',
                'auth/invalid-email': 'Invalid email address!',
                'auth/weak-password': 'Password too weak!',
                'auth/user-not-found': 'No account found with this email!',
                'auth/wrong-password': 'Incorrect password!',
                'auth/too-many-requests': 'Too many attempts. Try again later!',
                'auth/network-request-failed': 'Network error. Check your connection!'
            };
            
            return errors[errorCode] || 'Something went wrong. Please try again.';
        }
    </script>
</body>
</html>
